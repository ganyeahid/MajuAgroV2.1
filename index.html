<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Monitoring Kebun Maju Agro</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #16a34a;
            --primary-dark: #15803d;
            --primary-light: #22c55e;
            --secondary: #10b981;
            --accent: #86efac;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --purple: #a855f7;
            --blue: #3b82f6;
            --teal: #14b8a6;
            --bg: #f9fafb;
            --card: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        #root {
            min-height: 100vh;
        }
        
        .top-bar {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        
        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .logo-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-icon svg {
            width: 28px;
            height: 28px;
            fill: var(--primary);
        }
        
        .system-title {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }
        
        .top-bar-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 18px;
        }
        
        .icon-btn:hover {
            background: var(--bg);
        }
        
        .header {
            background: white;
            border-bottom: 1px solid var(--border);
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
        }
        
        .brand {
            padding: 20px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .brand-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .brand-name {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .nav-tabs {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        
        .nav-tab {
            padding: 12px 24px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            position: relative;
        }
        
        .nav-tab:hover {
            background: var(--bg);
            color: var(--text-primary);
        }
        
        .nav-tab.active {
            background: #dcfce7;
            color: var(--primary);
        }
        
        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        
        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        
        .category-section {
            margin-bottom: 48px;
        }
        
        .category-header {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 3px solid var(--primary);
        }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        
        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1;
        }
        
        .stat-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        .section-card {
            background: white;
            border-radius: 12px;
            padding: 28px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-primary);
        }
        
        .chart-container {
            position: relative;
            height: 250px;
        }
        
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        
        .circle-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
        }
        
        .circle-card {
            background: white;
            padding: 32px 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        
        .circle-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin-bottom: 16px;
        }
        
        .circle-svg {
            transform: rotate(-90deg);
        }
        
        .circle-bg {
            fill: none;
            stroke: #e5e7eb;
            stroke-width: 12;
        }
        
        .circle-progress {
            fill: none;
            stroke-width: 12;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease;
        }
        
        .circle-progress.high {
            stroke: var(--success);
        }
        
        .circle-progress.medium {
            stroke: var(--warning);
        }
        
        .circle-progress.low {
            stroke: var(--danger);
        }
        
        .circle-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .circle-label {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        
        .circle-detail {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        
        @media (max-width: 1200px) {
            .card-grid {
                grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            }
            .chart-grid {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 20px;
            }
            
            .nav-tabs {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            
            .circle-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        .plant-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow);
            transition: all 0.2s;
            border: 1px solid var(--border);
        }
        
        .plant-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }
        
        .plant-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 16px;
        }
        
        .plant-code {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .plant-code-icon {
            color: var(--text-secondary);
            font-size: 16px;
        }
        
        .badge-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .badge {
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .badge.sehat {
            background: #dcfce7;
            color: #166534;
        }
        
        .badge.abnormal {
            background: #fed7aa;
            color: #9a3412;
        }
        
        .badge.mati {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .badge.tambal-sulam {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .badge.generatif {
            background: #f3e8ff;
            color: #6b21a8;
        }
        
        .badge.vegetatif {
            background: #ccfbf1;
            color: #115e59;
        }
        
        .plant-type {
            font-size: 15px;
            color: var(--text-primary);
            margin-bottom: 16px;
            font-weight: 500;
        }
        
        .plant-meta {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .meta-icon {
            font-size: 16px;
        }
        
        .harvest-info {
            background: #f9fafb;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 13px;
            color: var(--text-primary);
        }
        
        .harvest-label {
            font-weight: 600;
            color: var(--purple);
        }
        
        .plant-note {
            border-left: 3px solid var(--primary);
            padding: 12px 16px;
            background: #f9fafb;
            border-radius: 0 8px 8px 0;
            font-style: italic;
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.6;
        }
        
        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .activity-item {
            display: flex;
            gap: 16px;
            padding: 16px;
            background: var(--bg);
            border-radius: 10px;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .activity-item:hover {
            background: #f3f4f6;
            transform: translateX(4px);
        }
        
        .activity-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        
        .activity-icon.healthy {
            background: #dcfce7;
        }
        
        .activity-icon.abnormal {
            background: #fed7aa;
        }
        
        .activity-content {
            flex: 1;
        }
        
        .activity-tree {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
        }
        
        .activity-meta {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal {
            background: white;
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: 700;
        }
        
        .close-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--bg);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .close-btn:hover {
            background: var(--border);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-primary);
        }
        
        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.2s;
        }
        
        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.1);
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .scanner-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 2000;
            display: flex;
            flex-direction: column;
        }
        
        .scanner-header {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .scanner-viewport {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .scanner-frame {
            width: 280px;
            height: 280px;
            border: 3px solid var(--primary);
            border-radius: 20px;
            position: relative;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
        }
        
        .scanner-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--primary);
            top: 0;
            animation: scan 2s linear infinite;
        }
        
        @keyframes scan {
            0%, 100% { top: 0; }
            50% { top: calc(100% - 2px); }
        }
        
        .scanner-instructions {
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 24px;
            text-align: center;
        }
        
        .fab {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            font-size: 28px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.3s;
            z-index: 99;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .fab:hover {
            background: var(--primary-dark);
            transform: scale(1.1);
        }
        
        .fab:active {
            transform: scale(0.95);
        }
        
        .alert-banner {
            background: #fef3c7;
            border-left: 4px solid var(--warning);
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: flex;
            gap: 16px;
            align-items: start;
        }
        
        .alert-icon {
            font-size: 24px;
        }
        
        .alert-content {
            flex: 1;
        }
        
        .alert-title {
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .filter-select {
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            background: white;
            cursor: pointer;
            min-width: 200px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Mock data generator
        const generateMockData = () => {
            const zones = ['A', 'B', 'C'];
            const subzones = ['1', '2'];
            const plants = [];
            
            let id = 1;
            zones.forEach(zone => {
                subzones.forEach(subzone => {
                    for (let jalur = 1; jalur <= 12; jalur++) {
                        for (let tree = 1; tree <= 8; tree++) {
                            const statuses = ['Sehat', 'Sehat', 'Sehat', 'Sehat', 'Abnormal', 'Mati'];
                            const types = ['Alpukat', 'Jambu Air'];
                            const status = statuses[Math.floor(Math.random() * statuses.length)];
                            const jenis = types[Math.floor(Math.random() * types.length)];
                            const fase = Math.random() > 0.4 ? 'TM' : 'TBM';
                            const isTambalSulam = Math.random() > 0.9;
                            
                            const varietasMap = {
                                'Alpukat': ['Hass', 'Miki', 'Kendil'],
                                'Jambu Air': ['Madu Deli', 'Semarang', 'Citra']
                            };
                            
                            const notes = [
                                "Pertumbuhan sangat baik, sudah mulai berbuah stabil.",
                                "Pohon baru pengganti.",
                                "Memerlukan pemupukan tambahan.",
                                "Kondisi optimal, produktivitas tinggi.",
                                "Perlu monitoring intensif.",
                            ];
                            
                            const panenTotal = fase === 'TM' && status === 'Sehat' ? Math.floor(Math.random() * 30 + 10) : 0;
                            
                            plants.push({
                                id: id++,
                                kode: `${zone}${subzone}-${String(jalur).padStart(3, '0')}-${String(tree).padStart(2, '0')}`,
                                zona: zone,
                                subzona: `${zone}${subzone}`,
                                jalur: jalur,
                                jenis: jenis,
                                varietas: varietasMap[jenis][Math.floor(Math.random() * varietasMap[jenis].length)],
                                status: status,
                                fase: fase,
                                isTambalSulam: isTambalSulam,
                                tanggalTanam: new Date(2022 + Math.floor(Math.random() * 3), Math.floor(Math.random() * 12), Math.floor(Math.random() * 28)),
                                lat: -6.20 + Math.random() * 0.01,
                                lng: 106.81 + Math.random() * 0.01,
                                tinggi: Math.floor(Math.random() * 200 + 100),
                                diameter: Math.floor(Math.random() * 30 + 10),
                                panenTotal: panenTotal,
                                panenPrediksi: fase === 'TM' ? Math.floor(panenTotal * 1.3) : 0,
                                prediksiTanggal: fase === 'TM' ? `2026-${String(Math.floor(Math.random() * 12) + 1).padStart(2, '0')}` : null,
                                catatan: Math.random() > 0.5 ? notes[Math.floor(Math.random() * notes.length)] : null
                            });
                        }
                    }
                });
            });
            
            return plants;
        };

        const generateMonitoringHistory = (plants) => {
            const history = [];
            const today = new Date();
            
            for (let i = 0; i < 20; i++) {
                const plant = plants[Math.floor(Math.random() * plants.length)];
                const date = new Date(today);
                date.setHours(date.getHours() - i * 2);
                
                history.push({
                    id: i + 1,
                    plantId: plant.id,
                    kode: plant.kode,
                    jenis: plant.jenis,
                    status: plant.status,
                    tinggi: plant.tinggi + Math.floor(Math.random() * 10),
                    diameter: plant.diameter + Math.floor(Math.random() * 2),
                    tanggal: date,
                    user: ['Budi Santoso', 'Siti Nurhaliza', 'Ahmad Fauzi'][Math.floor(Math.random() * 3)],
                    catatan: 'Pemantauan rutin'
                });
            }
            
            return history.sort((a, b) => b.tanggal - a.tanggal);
        };

        const initialPlants = generateMockData();
        const initialHistory = generateMonitoringHistory(initialPlants);

        // SVG Icons
        const LeafIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
            </svg>
        );

        // Circular Progress Component
        function CircularProgress({ percent, zona, sehat, total, jenis }) {
            const radius = 58;
            const circumference = 2 * Math.PI * radius;
            const offset = circumference - (percent / 100) * circumference;
            
            const healthClass = percent >= 70 ? 'high' : percent >= 50 ? 'medium' : 'low';
            
            return (
                <div className="circle-card">
                    <div className="circle-container">
                        <svg className="circle-svg" width="140" height="140">
                            <circle
                                className="circle-bg"
                                cx="70"
                                cy="70"
                                r={radius}
                            />
                            <circle
                                className={`circle-progress ${healthClass}`}
                                cx="70"
                                cy="70"
                                r={radius}
                                strokeDasharray={circumference}
                                strokeDashoffset={offset}
                            />
                        </svg>
                        <div className="circle-text">{percent}%</div>
                    </div>
                    <div className="circle-label">{jenis ? jenis : `Zona ${zona}`}</div>
                    <div className="circle-detail">{sehat}/{total} pohon sehat</div>
                </div>
            );
        }

        function App() {
            const [currentPage, setCurrentPage] = useState('dashboard');
            const [plants, setPlants] = useState(() => {
                const saved = localStorage.getItem('maju_agro_plants');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    return parsed.map(p => ({
                        ...p,
                        tanggalTanam: p.tanggalTanam ? new Date(p.tanggalTanam) : null
                    }));
                }
                return initialPlants;
            });
            const [monitoringHistory, setMonitoringHistory] = useState(() => {
                const saved = localStorage.getItem('maju_agro_history');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    return parsed.map(h => ({ ...h, tanggal: new Date(h.tanggal) }));
                }
                return initialHistory;
            });
            const [showMonitoringModal, setShowMonitoringModal] = useState(false);
            const [showAddPlantModal, setShowAddPlantModal] = useState(false);
            const [showScanner, setShowScanner] = useState(false);
            const [editingPlant, setEditingPlant] = useState(null);
            const [selectedPlant, setSelectedPlant] = useState(null);

            useEffect(() => {
                localStorage.setItem('maju_agro_plants', JSON.stringify(plants));
            }, [plants]);

            useEffect(() => {
                localStorage.setItem('maju_agro_history', JSON.stringify(monitoringHistory));
            }, [monitoringHistory]);


            const exportToExcel = () => {
                const data = plants.map(p => ({
                    kode: p.kode,
                    zona: p.zona,
                    subzona: p.subzona,
                    jalur: Number(p.jalur),
                    jenis: p.jenis,
                    varietas: p.varietas,
                    status: p.status,
                    fase: p.fase,
                    tambal_sulam: p.isTambalSulam ? 'Yes' : 'No',
                    tanggal_tanam: p.tanggalTanam 
                        ? new Date(p.tanggalTanam).toLocaleDateString('id-ID')
                        : '',
                    latitude: Number(p.lat),
                    longitude: Number(p.lng),
                    tinggi_cm: Number(p.tinggi || 0),
                    diameter_cm: Number(p.diameter || 0),
                    panen_total: Number(p.panenTotal || 0),
                    panen_prediksi: Number(p.panenPrediksi || 0),
                    prediksi_tanggal: p.prediksiTanggal || '',
                    catatan: p.catatan || ''
                }));

                const worksheet = XLSX.utils.json_to_sheet(data);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Tanaman");
                XLSX.writeFile(workbook, "Maju-agro-data.xlsx");
            };
    

            const handleScanQR = () => {
                setShowScanner(true);
                setTimeout(() => {
                    const randomPlant = plants[Math.floor(Math.random() * plants.length)];
                    setSelectedPlant(randomPlant);
                    setShowScanner(false);
                    setShowMonitoringModal(true);
                }, 2000);
            };

            const handleAddPlant = (newPlantData) => {
                const newPlant = {
                    id: plants.length > 0 ? Math.max(...plants.map(p => p.id)) + 1 : 1,
                    ...newPlantData,
                    tanggalTanam: new Date(newPlantData.tanggalTanam),
                };
                setPlants([...plants, newPlant]);
                setShowAddPlantModal(false);
            };

            const handleUpdatePlant = (updatedPlantData) => {
                setPlants(plants.map(p => p.id === updatedPlantData.id ? {
                    ...updatedPlantData,
                    tanggalTanam: new Date(updatedPlantData.tanggalTanam)
                } : p));
                setShowAddPlantModal(false);
                setEditingPlant(null);
            };

            const handleDeletePlant = (id) => {
                if (window.confirm('Apakah Anda yakin ingin menghapus data tanaman ini?')) {
                    setPlants(plants.filter(p => p.id !== id));
                }
            };

            return (
                <>
                    <div className="top-bar">
                        <div className="top-bar-left">
                            <div className="logo-icon">
                                <LeafIcon />
                            </div>
                            <div className="system-title">Sistem Monitoring Kebun Maju Agro</div>
                        </div>
                        <div className="top-bar-right">
                            <div className="icon-btn">☁️</div>
                            <div className="icon-btn">↩️</div>
                            <div className="icon-btn">↪️</div>
                        </div>
                    </div>
                    
                    <div className="header">
                        <div className="header-content">
                            <div className="brand">
                                <div className="brand-icon">🌿</div>
                                <div className="brand-name">Maju Agro</div>
                            </div>
                            <div className="nav-tabs">
                                <button 
                                    className={`nav-tab ${currentPage === 'dashboard' ? 'active' : ''}`}
                                    onClick={() => setCurrentPage('dashboard')}
                                >
                                    <span>📊</span> Dashboard
                                </button>
                                <button 
                                    className={`nav-tab ${currentPage === 'tanaman' ? 'active' : ''}`}
                                    onClick={() => setCurrentPage('tanaman')}
                                >
                                    <span>🌱</span> Tanaman
                                </button>
                                <button 
                                    className={`nav-tab ${currentPage === 'aktivitas' ? 'active' : ''}`}
                                    onClick={() => setCurrentPage('aktivitas')}
                                >
                                    <span>📝</span> Aktivitas
                                </button>
                                <button className="nav-tab">
                                    <span>⚙️</span> Pengaturan
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="container">
                        {currentPage === 'dashboard' && (
                            <Dashboard 
                                plants={plants} 
                                monitoringHistory={monitoringHistory}
                            />
                        )}
                        
                        {currentPage === 'tanaman' && (
                            <TanamanPage 
                                plants={plants} 
                                onAddPlant={() => { setEditingPlant(null); setShowAddPlantModal(true); }}
                                onEditPlant={(plant) => { setEditingPlant(plant); setShowAddPlantModal(true); }}
                                onDeletePlant={handleDeletePlant}
                                onExport={exportToExcel}
                            />
                        )}
                        
                        {currentPage === 'aktivitas' && (
                            <AktivitasPage 
                                monitoringHistory={monitoringHistory}
                                plants={plants}
                            />
                        )}
                    </div>

                    {currentPage === 'tanaman' && (
                        <button className="fab" onClick={handleScanQR}>
                            📷
                        </button>
                    )}

                    {showAddPlantModal && (
                        <AddPlantModal
                            onClose={() => { setShowAddPlantModal(false); setEditingPlant(null); }}
                            onSubmit={editingPlant ? handleUpdatePlant : handleAddPlant}
                            initialData={editingPlant}
                        />
                    )}

                    {showMonitoringModal && selectedPlant && (
                        <MonitoringModal
                            plant={selectedPlant}
                            onClose={() => {
                                setShowMonitoringModal(false);
                                setSelectedPlant(null);
                            }}
                            onSubmit={(data) => {
                                const newEntry = {
                                    id: monitoringHistory.length + 1,
                                    plantId: selectedPlant.id,
                                    kode: selectedPlant.kode,
                                    jenis: selectedPlant.jenis,
                                    tanggal: new Date(),
                                    user: 'Field Worker',
                                    ...data
                                };
                                setMonitoringHistory([newEntry, ...monitoringHistory]);
                                setPlants(plants.map(p => 
                                    p.id === selectedPlant.id ? { ...p, ...data } : p
                                ));
                                setShowMonitoringModal(false);
                                setSelectedPlant(null);
                            }}
                        />
                    )}

                    {showScanner && (
                        <ScannerScreen onClose={() => setShowScanner(false)} />
                    )}
                </>
            );
        }

        function Dashboard({ plants, monitoringHistory }) {
            const totalChartRef = useRef(null);
            const alpukatChartRef = useRef(null);
            const jambuChartRef = useRef(null);
            const chartInstances = useRef({});

            // Calculate statistics for each category
            const calculateStats = (filterType = null) => {
                const filtered = filterType ? plants.filter(p => p.jenis === filterType) : plants;
                return {
                    total: filtered.length,
                    sehat: filtered.filter(p => p.status === 'Sehat').length,
                    abnormal: filtered.filter(p => p.status === 'Abnormal').length,
                    mati: filtered.filter(p => p.status === 'Mati').length,
                };
            };

            const totalStats = calculateStats();
            const alpukatStats = calculateStats('Alpukat');
            const jambuStats = calculateStats('Jambu Air');

            const monitoringToday = monitoringHistory.filter(h => {
                const today = new Date();
                return h.tanggal.toDateString() === today.toDateString();
            }).length;

            // Calculate zone statistics for each plant type
            const calculateZoneStats = (jenis) => {
                return ['A', 'B', 'C'].map(zone => {
                    const zonePlants = plants.filter(p => p.zona === zone && p.jenis === jenis);
                    const zoneSehat = zonePlants.filter(p => p.status === 'Sehat').length;
                    const healthPercent = zonePlants.length > 0 ? Math.round((zoneSehat / zonePlants.length) * 100) : 0;
                    
                    return {
                        zona: zone,
                        total: zonePlants.length,
                        sehat: zoneSehat,
                        healthPercent: healthPercent,
                    };
                });
            };

            const alpukatZones = calculateZoneStats('Alpukat');
            const jambuZones = calculateZoneStats('Jambu Air');

            const createChart = (ref, stats, label) => {
                if (ref.current) {
                    const ctx = ref.current.getContext('2d');
                    return new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: ['Sehat', 'Abnormal', 'Mati'],
                            datasets: [{
                                label: label,
                                data: [stats.sehat, stats.abnormal, stats.mati],
                                backgroundColor: ['#22c55e', '#f59e0b', '#ef4444'],
                                borderRadius: 6,
                                barThickness: 50
                            }]
                        },
                        options: {
                            indexAxis: 'y',
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false }
                            },
                            scales: {
                                x: { 
                                    grid: { display: false },
                                    ticks: { font: { size: 13 } }
                                },
                                y: { 
                                    grid: { display: false },
                                    ticks: { font: { size: 14, weight: '600' } }
                                }
                            }
                        }
                    });
                }
            };

            useEffect(() => {
                // Destroy existing charts
                Object.values(chartInstances.current).forEach(chart => chart?.destroy());
                
                // Create new charts
                chartInstances.current.total = createChart(totalChartRef, totalStats, 'Total');
                chartInstances.current.alpukat = createChart(alpukatChartRef, alpukatStats, 'Alpukat');
                chartInstances.current.jambu = createChart(jambuChartRef, jambuStats, 'Jambu Air');

                return () => {
                    Object.values(chartInstances.current).forEach(chart => chart?.destroy());
                };
            }, [plants]);

            return (
                <>
                    <div className="page-header">
                        <div className="page-title">Dashboard</div>
                    </div>

                    {/* TOTAL CATEGORY */}
                    <div className="category-section">
                        <div className="category-header">📊 Total</div>
                        
                        <div className="dashboard-grid">
                            <div className="stat-card">
                                <div className="stat-label">Total Pohon</div>
                                <div className="stat-value">{totalStats.total}</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-label">Sehat</div>
                                <div className="stat-value">{totalStats.sehat}</div>
                                <div className="stat-subtitle">pohon</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-label">Abnormal</div>
                                <div className="stat-value">{totalStats.abnormal}</div>
                                <div className="stat-subtitle">pohon</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-label">Mati</div>
                                <div className="stat-value">{totalStats.mati}</div>
                                <div className="stat-subtitle">pohon</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-label">% Sehat</div>
                                <div className="stat-value">{Math.round((totalStats.sehat / totalStats.total) * 100)}%</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-label">Monitoring Hari Ini</div>
                                <div className="stat-value">{monitoringToday}</div>
                                <div className="stat-subtitle">aktivitas</div>
                            </div>
                        </div>

                        <div className="section-card">
                            <div className="section-title">Sebaran Status Tanaman - Total</div>
                            <div className="chart-container">
                                <canvas ref={totalChartRef}></canvas>
                            </div>
                        </div>
                    </div>

                    {/* ALPUKAT CATEGORY */}
                    <div className="category-section">
                        <div className="category-header">🥑 Alpukat</div>
                        
                        <div className="dashboard-grid">
                            <div className="stat-card">
                                <div className="stat-label">Total Pohon</div>
                                <div className="stat-value">{alpukatStats.total}</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-label">Sehat</div>
                                <div className="stat-value">{alpukatStats.sehat}</div>
                                <div className="stat-subtitle">pohon</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-label">Abnormal</div>
                                <div className="stat-value">{alpukatStats.abnormal}</div>
                                <div className="stat-subtitle">pohon</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-label">Mati</div>
                                <div className="stat-value">{alpukatStats.mati}</div>
                                <div className="stat-subtitle">pohon</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-label">% Sehat</div>
                                <div className="stat-value">{Math.round((alpukatStats.sehat / alpukatStats.total) * 100)}%</div>
                            </div>
                        </div>

                        <div className="chart-grid">
                            <div className="section-card">
                                <div className="section-title">Sebaran Status Tanaman - Alpukat</div>
                                <div className="chart-container">
                                    <canvas ref={alpukatChartRef}></canvas>
                                </div>
                            </div>

                            <div className="section-card">
                                <div className="section-title">% Sehat (Zona) - Alpukat</div>
                                <div className="circle-grid">
                                    {alpukatZones.map(zone => (
                                        <CircularProgress
                                            key={zone.zona}
                                            percent={zone.healthPercent}
                                            zona={zone.zona}
                                            sehat={zone.sehat}
                                            total={zone.total}
                                        />
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* JAMBU CATEGORY */}
                    <div className="category-section">
                        <div className="category-header">🍎 Jambu Air</div>
                        
                        <div className="dashboard-grid">
                            <div className="stat-card">
                                <div className="stat-label">Total Pohon</div>
                                <div className="stat-value">{jambuStats.total}</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-label">Sehat</div>
                                <div className="stat-value">{jambuStats.sehat}</div>
                                <div className="stat-subtitle">pohon</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-label">Abnormal</div>
                                <div className="stat-value">{jambuStats.abnormal}</div>
                                <div className="stat-subtitle">pohon</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-label">Mati</div>
                                <div className="stat-value">{jambuStats.mati}</div>
                                <div className="stat-subtitle">pohon</div>
                            </div>
                            <div className="stat-card">
                                <div className="stat-label">% Sehat</div>
                                <div className="stat-value">{Math.round((jambuStats.sehat / jambuStats.total) * 100)}%</div>
                            </div>
                        </div>

                        <div className="chart-grid">
                            <div className="section-card">
                                <div className="section-title">Sebaran Status Tanaman - Jambu Air</div>
                                <div className="chart-container">
                                    <canvas ref={jambuChartRef}></canvas>
                                </div>
                            </div>

                            <div className="section-card">
                                <div className="section-title">% Sehat (Zona) - Jambu Air</div>
                                <div className="circle-grid">
                                    {jambuZones.map(zone => (
                                        <CircularProgress
                                            key={zone.zona}
                                            percent={zone.healthPercent}
                                            zona={zone.zona}
                                            sehat={zone.sehat}
                                            total={zone.total}
                                        />
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* MONITORING TERBARU */}
                    <div className="section-card">
                        <div className="section-title">Monitoring Terbaru</div>
                        <div className="activity-list">
                            {monitoringHistory.slice(0, 8).map(activity => (
                                <div key={activity.id} className="activity-item">
                                    <div className={`activity-icon ${activity.status === 'Sehat' ? 'healthy' : 'abnormal'}`}>
                                        {activity.status === 'Sehat' ? '✅' : '⚠️'}
                                    </div>
                                    <div className="activity-content">
                                        <div className="activity-tree">{activity.kode} - {activity.jenis}</div>
                                        <div className="activity-meta">
                                            {activity.tanggal.toLocaleString('id-ID', {
                                                day: 'numeric',
                                                month: 'short',
                                                hour: '2-digit',
                                                minute: '2-digit'
                                            })} • {activity.user}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </>
            );
        }

        function TanamanPage({ plants, onAddPlant, onEditPlant, onDeletePlant, onExport }) {
            const [filterZone, setFilterZone] = useState('all');
            const [filterStatus, setFilterStatus] = useState('all');
            const [filterFase, setFilterFase] = useState('all');
            const [viewMode, setViewMode] = useState('gallery');

            const filteredPlants = plants.filter(plant => {
                if (filterZone !== 'all' && plant.zona !== filterZone) return false;
                if (filterStatus !== 'all' && plant.status !== filterStatus) return false;
                if (filterFase !== 'all' && plant.fase !== filterFase) return false;
                return true;
            });

            return (
                <>
                    <div className="page-header">
                        <div className="page-title">Database Tanaman</div>
                        <div style={{ display: 'flex', gap: '12px', alignItems: 'center' }}>
                            <div style={{ display: 'flex', gap: '4px', background: 'white', padding: '4px', borderRadius: '8px', border: '1px solid var(--border)' }}>
                                <button 
                                    onClick={() => setViewMode('gallery')}
                                    style={{
                                        padding: '8px 16px',
                                        border: 'none',
                                        background: viewMode === 'gallery' ? 'var(--primary)' : 'transparent',
                                        color: viewMode === 'gallery' ? 'white' : 'var(--text-secondary)',
                                        borderRadius: '6px',
                                        cursor: 'pointer',
                                        fontFamily: 'inherit',
                                        fontSize: '14px',
                                        fontWeight: '600',
                                        transition: 'all 0.2s'
                                    }}
                                >
                                    🖼️ Gallery
                                </button>
                                <button 
                                    onClick={() => setViewMode('list')}
                                    style={{
                                        padding: '8px 16px',
                                        border: 'none',
                                        background: viewMode === 'list' ? 'var(--primary)' : 'transparent',
                                        color: viewMode === 'list' ? 'white' : 'var(--text-secondary)',
                                        borderRadius: '6px',
                                        cursor: 'pointer',
                                        fontFamily: 'inherit',
                                        fontSize: '14px',
                                        fontWeight: '600',
                                        transition: 'all 0.2s'
                                    }}
                                >
                                    📋 List
                                </button>
                            </div>
                            
                            <button className="btn" onClick={onExport}
                                style={{ background: '#3b82f6', color: 'white' }}>
                                ⬇️ Export Excel
                            </button>

                            <button className="btn btn-primary" onClick={onAddPlant}>
                                <span>+</span> Tambah Data
                            </button>
                        </div>
                    </div>

                    <div className="filter-bar">
                        <select 
                            className="filter-select"
                            value={filterZone}
                            onChange={(e) => setFilterZone(e.target.value)}
                        >
                            <option value="all">Semua Zona</option>
                            <option value="A">Zona A</option>
                            <option value="B">Zona B</option>
                            <option value="C">Zona C</option>
                        </select>
                        <select 
                            className="filter-select"
                            value={filterStatus}
                            onChange={(e) => setFilterStatus(e.target.value)}
                        >
                            <option value="all">Semua Status</option>
                            <option value="Sehat">Sehat</option>
                            <option value="Abnormal">Abnormal</option>
                            <option value="Mati">Mati</option>
                        </select>
                        <select 
                            className="filter-select"
                            value={filterFase}
                            onChange={(e) => setFilterFase(e.target.value)}
                        >
                            <option value="all">Semua Fase</option>
                            <option value="TM">Generatif (TM)</option>
                            <option value="TBM">Vegetatif (TBM)</option>
                        </select>
                    </div>

                    {viewMode === 'gallery' ? (
                        <div className="card-grid">
                            {filteredPlants.slice(0, 20).map(plant => (
                                <PlantCard key={plant.id} plant={plant} />
                            ))}
                        </div>
                    ) : (
                        <PlantListView 
                            plants={filteredPlants} 
                            onEdit={onEditPlant}
                            onDelete={onDeletePlant}
                        />
                    )}
                </>
            );
        }

        function PlantListView({ plants, onEdit, onDelete }) {
            return (
                <div className="section-card">
                    <div style={{ overflowX: 'auto', maxHeight: '600px', overflowY: 'auto' }}>
                        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                            <thead>
                                <tr style={{ borderBottom: '2px solid var(--border)', background: 'white', position: 'sticky', top: 0, zIndex: 1 }}>
                                    <th style={{ padding: '12px', textAlign: 'left', fontWeight: '600', fontSize: '13px', color: 'var(--text-secondary)' }}>Kode</th>
                                    <th style={{ padding: '12px', textAlign: 'left', fontWeight: '600', fontSize: '13px', color: 'var(--text-secondary)' }}>Jenis</th>
                                    <th style={{ padding: '12px', textAlign: 'left', fontWeight: '600', fontSize: '13px', color: 'var(--text-secondary)' }}>Varietas</th>
                                    <th style={{ padding: '12px', textAlign: 'left', fontWeight: '600', fontSize: '13px', color: 'var(--text-secondary)' }}>Status</th>
                                    <th style={{ padding: '12px', textAlign: 'left', fontWeight: '600', fontSize: '13px', color: 'var(--text-secondary)' }}>Fase</th>
                                    <th style={{ padding: '12px', textAlign: 'left', fontWeight: '600', fontSize: '13px', color: 'var(--text-secondary)' }}>Zona</th>
                                    <th style={{ padding: '12px', textAlign: 'left', fontWeight: '600', fontSize: '13px', color: 'var(--text-secondary)' }}>Tinggi</th>
                                    <th style={{ padding: '12px', textAlign: 'left', fontWeight: '600', fontSize: '13px', color: 'var(--text-secondary)' }}>Diameter</th>
                                    <th style={{ padding: '12px', textAlign: 'left', fontWeight: '600', fontSize: '13px', color: 'var(--text-secondary)' }}>Tanam</th>
                                    <th style={{ padding: '12px', textAlign: 'center', fontWeight: '600', fontSize: '13px', color: 'var(--text-secondary)' }}>Aksi</th>
                                </tr>
                            </thead>
                            <tbody>
                                {plants.map(plant => (
                                    <tr key={plant.id} style={{ borderBottom: '1px solid var(--border)', transition: 'background 0.2s' }}
                                        onMouseEnter={(e) => e.currentTarget.style.background = 'var(--bg)'}
                                        onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}>
                                        <td style={{ padding: '16px 12px' }}>
                                            <div style={{ fontWeight: '700', fontSize: '14px' }}>{plant.kode}</div>
                                            {plant.isTambalSulam && (
                                                <span className="badge tambal-sulam" style={{ marginTop: '4px', display: 'inline-block' }}>
                                                    Tambal Sulam
                                                </span>
                                            )}
                                        </td>
                                        <td style={{ padding: '16px 12px', fontSize: '14px' }}>{plant.jenis}</td>
                                        <td style={{ padding: '16px 12px', fontSize: '14px' }}>{plant.varietas}</td>
                                        <td style={{ padding: '16px 12px' }}>
                                            <span className={`badge ${plant.status.toLowerCase()}`}>
                                                {plant.status}
                                            </span>
                                        </td>
                                        <td style={{ padding: '16px 12px' }}>
                                            <span className={`badge ${plant.fase === 'TM' ? 'generatif' : 'vegetatif'}`}>
                                                {plant.fase}
                                            </span>
                                        </td>
                                        <td style={{ padding: '16px 12px', fontSize: '14px' }}>{plant.zona}{plant.subzona.charAt(1)}</td>
                                        <td style={{ padding: '16px 12px', fontSize: '14px' }}>{plant.tinggi} cm</td>
                                        <td style={{ padding: '16px 12px', fontSize: '14px' }}>{plant.diameter} cm</td>
                                        <td style={{ padding: '16px 12px', fontSize: '13px', color: 'var(--text-secondary)' }}>
                                            {new Date(plant.tanggalTanam).toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric' })}
                                        </td>
                                        <td style={{ padding: '16px 12px', textAlign: 'center' }}>
                                            <div style={{ display: 'flex', gap: '8px', justifyContent: 'center' }}>
                                                <button 
                                                    onClick={() => onEdit(plant)}
                                                    className="icon-btn" 
                                                    style={{ width: '32px', height: '32px', fontSize: '14px', borderColor: 'var(--primary)', color: 'var(--primary)' }}
                                                    title="Edit"
                                                >
                                                    ✏️
                                                </button>
                                                <button 
                                                    onClick={() => onDelete(plant.id)}
                                                    className="icon-btn" 
                                                    style={{ width: '32px', height: '32px', fontSize: '14px', borderColor: 'var(--danger)', color: 'var(--danger)' }}
                                                    title="Hapus"
                                                >
                                                    🗑️
                                                </button>
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function PlantCard({ plant }) {
            return (
                <div className="plant-card">
                    <div className="plant-header">
                        <div className="plant-code">
                            <span className="plant-code-icon">🏷️</span>
                            {plant.kode}
                        </div>
                        <div className="badge-group">
                            <span className={`badge ${plant.status.toLowerCase()}`}>
                                {plant.status}
                            </span>
                            {plant.isTambalSulam && (
                                <span className="badge tambal-sulam">
                                    Tambal Sulam
                                </span>
                            )}
                        </div>
                    </div>
                    
                    <div className="plant-type">
                        {plant.jenis} • {plant.varietas}
                    </div>
                    
                    <div className="plant-meta">
                        <div className="meta-item">
                            <span className="meta-icon">📍</span>
                            <span>{plant.lat.toFixed(5)}, {plant.lng.toFixed(5)}</span>
                        </div>
                        <div className="meta-item">
                            <span className="meta-icon">📅</span>
                            <span>Tanam: {new Date(plant.tanggalTanam).toLocaleDateString('id-ID', { year: 'numeric', month: '2-digit', day: '2-digit' })}</span>
                        </div>
                    </div>
                    
                    <div className="badge-group" style={{ marginTop: '12px' }}>
                        <span className={`badge ${plant.fase === 'TM' ? 'generatif' : 'vegetatif'}`}>
                            {plant.fase === 'TM' ? 'Generatif (TM)' : 'Vegetatif (TBM)'}
                        </span>
                    </div>
                    
                    {plant.fase === 'TM' && plant.panenTotal > 0 && (
                        <div className="harvest-info">
                            <span className="harvest-label">Panen:</span> {plant.panenTotal} Kg (Total) • 
                            <span className="harvest-label"> Prediksi:</span> {plant.prediksiTanggal} ({plant.panenPrediksi} Kg)
                        </div>
                    )}
                    
                    {plant.catatan && (
                        <div className="plant-note">
                            "{plant.catatan}"
                        </div>
                    )}
                </div>
            );
        }

        function AktivitasPage({ monitoringHistory, plants }) {
            return (
                <>
                    <div className="page-header">
                        <div className="page-title">Riwayat Aktivitas</div>
                    </div>

                    <div className="section-card">
                        <div className="activity-list">
                            {monitoringHistory.map(activity => {
                                const plant = plants.find(p => p.id === activity.plantId);
                                return (
                                    <div key={activity.id} className="activity-item">
                                        <div className={`activity-icon ${activity.status === 'Sehat' ? 'healthy' : 'abnormal'}`}>
                                            {activity.status === 'Sehat' ? '✅' : '⚠️'}
                                        </div>
                                        <div className="activity-content">
                                            <div className="activity-tree">
                                                {activity.kode} - {activity.jenis} {plant?.varietas}
                                            </div>
                                            <div className="activity-meta">
                                                Tinggi: {activity.tinggi}cm • Diameter: {activity.diameter}cm
                                            </div>
                                            <div className="activity-meta">
                                                {activity.tanggal.toLocaleString('id-ID', {
                                                    day: 'numeric',
                                                    month: 'long',
                                                    year: 'numeric',
                                                    hour: '2-digit',
                                                    minute: '2-digit'
                                                })} • {activity.user}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </>
            );
        }

        function MonitoringModal({ plant, onClose, onSubmit }) {
            const [formData, setFormData] = useState({
                tinggi: plant.tinggi || '',
                diameter: plant.diameter || '',
                status: plant.status || 'Sehat',
                catatan: '',
                foto: null
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                onSubmit(formData);
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <div className="modal-title">Input Monitoring</div>
                            <button className="close-btn" onClick={onClose}>✕</button>
                        </div>

                        <div className="plant-card" style={{ marginBottom: '24px' }}>
                            <div className="plant-code">{plant.kode}</div>
                            <div className="plant-type">{plant.jenis} - {plant.varietas}</div>
                            <div className="meta-item">
                                <span className="meta-icon">📍</span>
                                <span>Zona {plant.zona} - {plant.subzona}</span>
                            </div>
                        </div>

                        <form onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label className="form-label">Tinggi (cm)</label>
                                <input
                                    type="number"
                                    className="form-input"
                                    value={formData.tinggi}
                                    onChange={(e) => setFormData({ ...formData, tinggi: e.target.value })}
                                    required
                                />
                            </div>

                            <div className="form-group">
                                <label className="form-label">Diameter (cm)</label>
                                <input
                                    type="number"
                                    className="form-input"
                                    value={formData.diameter}
                                    onChange={(e) => setFormData({ ...formData, diameter: e.target.value })}
                                    required
                                />
                            </div>

                            <div className="form-group">
                                <label className="form-label">Status</label>
                                <select
                                    className="form-select"
                                    value={formData.status}
                                    onChange={(e) => setFormData({ ...formData, status: e.target.value })}
                                    required
                                >
                                    <option value="Sehat">Sehat</option>
                                    <option value="Abnormal">Abnormal</option>
                                    <option value="Mati">Mati</option>
                                </select>
                            </div>

                            <div className="form-group">
                                <label className="form-label">Catatan</label>
                                <textarea
                                    className="form-textarea"
                                    value={formData.catatan}
                                    onChange={(e) => setFormData({ ...formData, catatan: e.target.value })}
                                    placeholder="Tambahkan catatan (opsional)"
                                ></textarea>
                            </div>

                            <button type="submit" className="btn btn-primary" style={{ width: '100%' }}>
                                <span>✓</span> Simpan Monitoring
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        function AddPlantModal({ onClose, onSubmit, initialData }) {
            const [formData, setFormData] = useState({
                id: initialData?.id || '',
                kode: initialData?.kode || '',
                zona: initialData?.zona || 'A',
                subzona: initialData?.subzona || 'A1',
                jalur: initialData?.jalur || (initialData?.kode ? parseInt(initialData.kode.split('-')[1]) : ''),
                nomorPohon: initialData?.nomorPohon || (initialData?.kode ? parseInt(initialData.kode.split('-')[2]) : ''),
                jenis: initialData?.jenis || 'Alpukat',
                varietas: initialData?.varietas || 'Hass',
                status: initialData?.status || 'Sehat',
                fase: initialData?.fase || 'TBM',
                isTambalSulam: initialData?.isTambalSulam || false,
                tanggalTanam: initialData?.tanggalTanam 
                    ? new Date(initialData.tanggalTanam).toISOString().split('T')[0] 
                    : new Date().toISOString().split('T')[0],
                lat: initialData?.lat || -6.20,
                lng: initialData?.lng || 106.81,
                tinggi: initialData?.tinggi || '',
                diameter: initialData?.diameter || '',
                panenTotal: initialData?.panenTotal || 0,
                panenPrediksi: initialData?.panenPrediksi || 0,
                prediksiTanggal: initialData?.prediksiTanggal || null,
                catatan: initialData?.catatan || '',
                foto: null,
                fotoPreview: null
            });

            const varietasMap = {
                'Alpukat': ['Hass', 'Miki', 'Kendil'],
                'Jambu Air': ['Madu Deli', 'Semarang', 'Citra']
            };

            // Auto-generate code when jalur or nomorPohon changes
            const generateKode = (subzona, jalur, nomorPohon) => {
                if (jalur && nomorPohon) {
                    return `${subzona}-${String(jalur).padStart(3, '0')}-${String(nomorPohon).padStart(2, '0')}`;
                }
                return '';
            };

            const handleFieldChange = (field, value) => {
                const newFormData = { ...formData, [field]: value };
                
                // Auto-generate kode if jalur and nomorPohon are filled
                if (field === 'jalur' || field === 'nomorPohon' || field === 'subzona') {
                    newFormData.kode = generateKode(
                        field === 'subzona' ? value : formData.subzona,
                        field === 'jalur' ? value : formData.jalur,
