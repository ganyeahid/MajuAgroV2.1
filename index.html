                        field === 'nomorPohon' ? value : formData.nomorPohon
                    );
                }
                
                setFormData(newFormData);
            };

            const handleJenisChange = (jenis) => {
                setFormData({
                    ...formData,
                    jenis: jenis,
                    varietas: varietasMap[jenis][0]
                });
            };

            const handlePhotoChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setFormData({ 
                            ...formData, 
                            foto: reader.result,
                            fotoPreview: reader.result
                        });
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                
                onSubmit({
                    ...formData,
                    tinggi: formData.tinggi ? parseInt(formData.tinggi) : 0,
                    diameter: formData.diameter ? parseInt(formData.diameter) : 0,
                    jalur: parseInt(formData.jalur),
                    nomorPohon: parseInt(formData.nomorPohon)
                });
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <div className="modal-title">{initialData ? 'Edit Data Tanaman' : 'Tambah Data Tanaman'}</div>
                            <button className="close-btn" onClick={onClose}>✕</button>
                        </div>

                        <form onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label className="form-label">Kode Pohon (Auto-generated)</label>
                                <input
                                    type="text"
                                    className="form-input"
                                    value={formData.kode}
                                    readOnly
                                    style={{ background: 'var(--bg)', cursor: 'not-allowed' }}
                                    placeholder="SubZona-JalurNo(3digit)-PohonNo(2digit)"
                                />
                            </div>

                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
                                <div className="form-group">
                                    <label className="form-label">Zona</label>
                                    <select
                                        className="form-select"
                                        value={formData.zona}
                                        onChange={(e) => handleFieldChange('zona', e.target.value)}
                                        required
                                    >
                                        <option value="A">Zona A</option>
                                        <option value="B">Zona B</option>
                                        <option value="C">Zona C</option>
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Subzona</label>
                                    <select
                                        className="form-select"
                                        value={formData.subzona}
                                        onChange={(e) => handleFieldChange('subzona', e.target.value)}
                                        required
                                    >
                                        <option value="A1">A1</option>
                                        <option value="A2">A2</option>
                                        <option value="B1">B1</option>
                                        <option value="B2">B2</option>
                                        <option value="C1">C1</option>
                                        <option value="C2">C2</option>
                                    </select>
                                </div>
                            </div>

                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
                                <div className="form-group">
                                    <label className="form-label">Nomor Jalur</label>
                                    <input
                                        type="number"
                                        className="form-input"
                                        value={formData.jalur}
                                        onChange={(e) => handleFieldChange('jalur', e.target.value)}
                                        required
                                        min="1"
                                        placeholder="Contoh: 1, 2, 3"
                                    />
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Nomor Pohon</label>
                                    <input
                                        type="number"
                                        className="form-input"
                                        value={formData.nomorPohon}
                                        onChange={(e) => handleFieldChange('nomorPohon', e.target.value)}
                                        required
                                        min="1"
                                        placeholder="Contoh: 1, 2, 3"
                                    />
                                </div>
                            </div>

                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
                                <div className="form-group">
                                    <label className="form-label">Jenis Tanaman</label>
                                    <select
                                        className="form-select"
                                        value={formData.jenis}
                                        onChange={(e) => handleJenisChange(e.target.value)}
                                        required
                                    >
                                        <option value="Alpukat">Alpukat</option>
                                        <option value="Jambu Air">Jambu Air</option>
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Varietas</label>
                                    <select
                                        className="form-select"
                                        value={formData.varietas}
                                        onChange={(e) => setFormData({ ...formData, varietas: e.target.value })}
                                        required
                                    >
                                        {varietasMap[formData.jenis].map(v => (
                                            <option key={v} value={v}>{v}</option>
                                        ))}
                                    </select>
                                </div>
                            </div>

                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
                                <div className="form-group">
                                    <label className="form-label">Status</label>
                                    <select
                                        className="form-select"
                                        value={formData.status}
                                        onChange={(e) => setFormData({ ...formData, status: e.target.value })}
                                        required
                                    >
                                        <option value="Sehat">Sehat</option>
                                        <option value="Abnormal">Abnormal</option>
                                        <option value="Mati">Mati</option>
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Fase</label>
                                    <select
                                        className="form-select"
                                        value={formData.fase}
                                        onChange={(e) => setFormData({ ...formData, fase: e.target.value })}
                                        required
                                    >
                                        <option value="TBM">Vegetatif (TBM)</option>
                                        <option value="TM">Generatif (TM)</option>
                                    </select>
                                </div>
                            </div>

                            <div className="form-group">
                                <label className="form-label">Tanggal Tanam</label>
                                <input
                                    type="date"
                                    className="form-input"
                                    value={formData.tanggalTanam}
                                    onChange={(e) => setFormData({ ...formData, tanggalTanam: e.target.value })}
                                    required
                                />
                            </div>

                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
                                <div className="form-group">
                                    <label className="form-label">Latitude</label>
                                    <input
                                        type="number"
                                        step="0.00001"
                                        className="form-input"
                                        value={formData.lat}
                                        onChange={(e) => setFormData({ ...formData, lat: parseFloat(e.target.value) })}
                                        required
                                    />
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Longitude</label>
                                    <input
                                        type="number"
                                        step="0.00001"
                                        className="form-input"
                                        value={formData.lng}
                                        onChange={(e) => setFormData({ ...formData, lng: parseFloat(e.target.value) })}
                                        required
                                    />
                                </div>
                            </div>

                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
                                <div className="form-group">
                                    <label className="form-label">Tinggi (cm) - Opsional</label>
                                    <input
                                        type="number"
                                        className="form-input"
                                        value={formData.tinggi}
                                        onChange={(e) => setFormData({ ...formData, tinggi: e.target.value })}
                                        min="1"
                                        placeholder="Masukkan tinggi"
                                    />
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Diameter (cm) - Opsional</label>
                                    <input
                                        type="number"
                                        className="form-input"
                                        value={formData.diameter}
                                        onChange={(e) => setFormData({ ...formData, diameter: e.target.value })}
                                        min="1"
                                        placeholder="Masukkan diameter"
                                    />
                                </div>
                            </div>

                            <div className="form-group">
                                <label style={{ display: 'flex', alignItems: 'center', gap: '8px', cursor: 'pointer' }}>
                                    <input
                                        type="checkbox"
                                        checked={formData.isTambalSulam}
                                        onChange={(e) => setFormData({ ...formData, isTambalSulam: e.target.checked })}
                                        style={{ width: '18px', height: '18px' }}
                                    />
                                    <span className="form-label" style={{ margin: 0 }}>Tambal Sulam</span>
                                </label>
                            </div>

                            <div className="form-group">
                                <label className="form-label">Catatan</label>
                                <textarea
                                    className="form-textarea"
                                    value={formData.catatan}
                                    onChange={(e) => setFormData({ ...formData, catatan: e.target.value })}
                                    placeholder="Tambahkan catatan (opsional)"
                                ></textarea>
                            </div>

                            <div className="form-group">
                                <label className="form-label">Foto Tanaman</label>
                                <input
                                    type="file"
                                    accept="image/*"
                                    onChange={handlePhotoChange}
                                    style={{ display: 'none' }}
                                    id="photo-upload-add"
                                />
                                <label htmlFor="photo-upload-add" style={{ 
                                    display: 'block',
                                    padding: '40px 20px',
                                    border: '2px dashed var(--border)',
                                    borderRadius: '12px',
                                    textAlign: 'center',
                                    cursor: 'pointer',
                                    transition: 'all 0.2s'
                                }}>
                                    📷 Upload Foto Tanaman
                                </label>
                                {formData.fotoPreview && (
                                    <img 
                                        src={formData.fotoPreview} 
                                        alt="Preview" 
                                        style={{ 
                                            width: '100%', 
                                            borderRadius: '12px', 
                                            marginTop: '12px',
                                            maxHeight: '300px',
                                            objectFit: 'cover'
                                        }} 
                                    />
                                )}
                            </div>

                            <button type="submit" className="btn btn-primary" style={{ width: '100%' }}>
                                <span>✓</span> {initialData ? 'Update Data Tanaman' : 'Simpan Data Tanaman'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        function ScannerScreen({ onClose }) {
            return (
                <div className="scanner-screen">
                    <div className="scanner-header">
                        <div style={{ fontSize: '18px', fontWeight: '600' }}>Scan QR Code</div>
                        <button className="close-btn" onClick={onClose} style={{ color: 'white', background: 'rgba(255,255,255,0.2)' }}>✕</button>
                    </div>
                    <div className="scanner-viewport">
                        <div className="scanner-frame">
                            <div className="scanner-line"></div>
                        </div>
                    </div>
                    <div className="scanner-instructions">
                        <div style={{ fontSize: '18px', marginBottom: '8px', fontWeight: '600' }}>
                            Arahkan kamera ke QR Code pohon
                        </div>
                        <div style={{ fontSize: '14px', opacity: '0.7' }}>
                            Scanning otomatis akan dimulai
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
